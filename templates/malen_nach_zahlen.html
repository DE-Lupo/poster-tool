<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Malen nach Zahlen</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    text-align: center;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    min-height: 620px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: none;
    border: 1px solid rgba(0,0,0,0.05);
}

h1 { margin-bottom: 10px; }
p { color: #555; }

input[type="file"] { margin-top: 15px; }

#previewBox {
    margin: 20px auto 0;
    width: 100%;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    overflow: hidden;
}

#placeholder {
    color: #999;
    font-size: 14px;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

select {
    margin-top: 18px;
    padding: 10px;
    font-size: 16px;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover { background: #5b21b6; }

button:disabled {
    background: #999;
    cursor: not-allowed;
}

#consentMessage {
    display: none;
    margin-top: 18px;
    color: #b45309;
    font-weight: bold;
}

#doneMessage {
    display: none;
    margin-top: 18px;
    color: #15803d;
    font-weight: bold;
}

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.loaderBox {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 280px;
    text-align: center;
}

.spinner {
    width: 52px;
    height: 52px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Malen nach Zahlen</h1>
    <p>Wandeln Sie Ihr Bild in eine einfache Malvorlage mit Farblegende um.</p>

    <form id="form" action="/create-malen-nach-zahlen" method="post" enctype="multipart/form-data" target="downloadFrame">
        <input id="imageInput" type="file" name="image" accept="image/*" required>

        <div id="previewBox">
            <span id="placeholder">Noch kein Bild ausgewählt</span>
            <img id="preview" alt="Bildvorschau">
        </div>

        <br>

        <label style="display:block;margin-top:18px;color:#555;">
            Anzahl Farben
        </label>

        <select name="color_count">
            <option value="6">6 Farben</option>
            <option value="8" selected>8 Farben</option>
            <option value="10">10 Farben</option>
            <option value="12">12 Farben</option>
            <option value="16">16 Farben</option>
        </select>

        <br>

        <button id="submitButton" type="submit">Vorlage erstellen</button>
    </form>

    <div id="consentMessage">
        Bitte akzeptieren Sie die funktionalen Services, um dieses Tool zu nutzen.
    </div>

    <div id="doneMessage">
        Vorlage wurde erstellt. Der ZIP-Download sollte gestartet sein.
    </div>
</div>

<iframe name="downloadFrame" id="downloadFrame" style="display:none;"></iframe>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <h3>Vorlage wird erstellt…</h3>
        <p>Bitte kurz warten.</p>
    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");
const form = document.getElementById("form");
const loadingOverlay = document.getElementById("loadingOverlay");
const submitButton = document.getElementById("submitButton");
const doneMessage = document.getElementById("doneMessage");
const consentMessage = document.getElementById("consentMessage");
const downloadFrame = document.getElementById("downloadFrame");

let submitted = false;

function hasConsent() {
    return window.RCB_Consent && window.RCB_Consent.hasConsent("bildverarbeitungs-tools-poster-raster-farb-tool-etc");
}

function showConsentMessage() {
    consentMessage.style.display = "block";
    doneMessage.style.display = "none";
    loadingOverlay.style.display = "none";
    submitButton.disabled = false;
    submitButton.innerText = "Vorlage erstellen";
}

imageInput.addEventListener("click", function (e) {
    if (!hasConsent()) {
        e.preventDefault();
        showConsentMessage();
    }
});

imageInput.addEventListener("change", function () {
    doneMessage.style.display = "none";
    consentMessage.style.display = "none";

    if (!hasConsent()) {
        this.value = "";
        preview.style.display = "none";
        placeholder.style.display = "block";
        showConsentMessage();
        return;
    }

    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        placeholder.style.display = "block";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
    };

    reader.readAsDataURL(file);
});

form.addEventListener("change", function () {
    doneMessage.style.display = "none";
    consentMessage.style.display = "none";
});

form.addEventListener("submit", function (e) {
    doneMessage.style.display = "none";
    consentMessage.style.display = "none";

    if (!hasConsent()) {
        e.preventDefault();
        imageInput.value = "";
        preview.style.display = "none";
        placeholder.style.display = "block";
        showConsentMessage();
        return;
    }

    submitted = true;
    loadingOverlay.style.display = "flex";
    submitButton.disabled = true;
    submitButton.innerText = "Vorlage wird erstellt...";
});

downloadFrame.addEventListener("load", function () {
    if (!submitted) return;

    loadingOverlay.style.display = "none";
    submitButton.disabled = false;
    submitButton.innerText = "Vorlage erstellen";
    doneMessage.style.display = "block";
    submitted = false;
});

setInterval(function () {
    if (submitted) {
        loadingOverlay.style.display = "none";
        submitButton.disabled = false;
        submitButton.innerText = "Vorlage erstellen";
        doneMessage.style.display = "block";
        submitted = false;
    }
}, 12000);
</script>

</body>
</html>
