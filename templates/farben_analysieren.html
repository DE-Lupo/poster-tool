<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farben analysieren</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

select, input[type="file"] {
    margin-top: 12px;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#previewBox {
    margin-top: 20px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fafafa;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

button {
    margin-top: 25px;
    padding: 15px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:disabled { background: #999; }

/* Popup */

#paletteModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9998;
    align-items: center;
    justify-content: center;
}

.modalBox {
    background: white;
    border-radius: 20px;
    padding: 30px;
    max-width: 760px;
    width: 95%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
}

#closeModal {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: #6d28d9;
    color: white;
    font-size: 22px;
}

/* Hinweis */

.mixNotice {
    background: #fef3c7;
    padding: 12px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 20px;
}

/* Farben */

#palette {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
}

.colorCard {
    width: 220px;
    border: 1px solid #ddd;
    border-radius: 14px;
    overflow: hidden;
    background: white;
    display: flex;
    flex-direction: column;
}

.colorBox { height: 70px; }

.colorInfo {
    padding: 12px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.colorLine { white-space: nowrap; }

.mixBox {
    margin-top: 10px;
    padding: 10px;
    background: #f8fafc;
    border-radius: 10px;
    min-height: 120px;
}

.copyRow {
    display: flex;
    gap: 8px;
    margin-top: auto;
}

.copyButton {
    flex: 1;
    padding: 8px;
    font-size: 12px;
    border-radius: 8px;
    background: #1679D6;
    color: white;
}

/* Loader */

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="container">
    <h1>Farben analysieren</h1>

    <label>Farbmedium</label>
    <select id="mediumSelect">
        <option value="acryl">Acryl</option>
        <option value="oel">Öl</option>
        <option value="aquarell">Aquarell</option>
    </select>

    <label>Anzahl Farben</label>
    <select id="colorCountSelect">
        <option value="4">4 Farben</option>
        <option value="6" selected>6 Farben</option>
        <option value="8">8 Farben</option>
        <option value="10">10 Farben</option>
    </select>

    <input id="imageInput" type="file">

    <div id="previewBox">
        <img id="preview">
    </div>

    <button id="analyzeButton" disabled>Farben analysieren</button>
</div>

<div id="paletteModal">
    <div class="modalBox">
        <button id="closeModal">&times;</button>
        <h2>Farbpalette</h2>

        <div class="mixNotice">
            Hinweis: Mischungen sind Annäherungen.
        </div>

        <div id="palette"></div>
    </div>
</div>

<div id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const analyzeButton = document.getElementById("analyzeButton");
const palette = document.getElementById("palette");
const paletteModal = document.getElementById("paletteModal");

const mediumSelect = document.getElementById("mediumSelect");
const colorCountSelect = document.getElementById("colorCountSelect");

let loadedImage;

imageInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        preview.src = ev.target.result;
        preview.style.display = "block";
        analyzeButton.disabled = false;

        loadedImage = new Image();
        loadedImage.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

analyzeButton.onclick = () => {
    document.getElementById("loadingOverlay").style.display = "flex";

    setTimeout(() => {
        const count = parseInt(colorCountSelect.value);
        const colors = extractColors(loadedImage, count);
        displayColors(colors);

        document.getElementById("loadingOverlay").style.display = "none";
        paletteModal.style.display = "flex";
    }, 400);
};

function extractColors(img, count) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 150;
    canvas.height = 150;
    ctx.drawImage(img, 0, 0, 150, 150);

    const data = ctx.getImageData(0,0,150,150).data;
    const map = {};

    for (let i=0;i<data.length;i+=16){
        let r = Math.round(data[i]/32)*32;
        let g = Math.round(data[i+1]/32)*32;
        let b = Math.round(data[i+2]/32)*32;
        const key = `${r},${g},${b}`;
        map[key] = (map[key]||0)+1;
    }

    return Object.entries(map)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,count)
        .map(e=>{
            const [r,g,b]=e[0].split(",").map(Number);
            return {r,g,b,hex:rgbToHex(r,g,b)};
        });
}

function rgbToHex(r,g,b){
    return "#"+[r,g,b].map(x=>{
        const h=x.toString(16);
        return h.length===1?"0"+h:h;
    }).join("").toUpperCase();
}

function getMix(r,g,b){
    const medium = mediumSelect.value;

    if(medium==="aquarell"){
        return ["Farbe lasieren","Mit Wasser aufhellen"];
    }

    if(r>g && r>b) return ["3 Teile Rot","1 Teil Weiß"];
    if(g>r && g>b) return ["2 Teile Gelb","1 Teil Blau"];
    if(b>r && b>g) return ["3 Teile Blau","1 Teil Weiß"];

    return ["Weiß","Schwarz"];
}

function displayColors(colors){
    palette.innerHTML="";

    colors.forEach(c=>{
        const mix = getMix(c.r,c.g,c.b);

        const card=document.createElement("div");
        card.className="colorCard";

        card.innerHTML=`
            <div class="colorBox" style="background:${c.hex}"></div>
            <div class="colorInfo">
                <div class="colorLine"><strong>${c.hex}</strong></div>
                <div class="colorLine">RGB ${c.r}, ${c.g}, ${c.b}</div>

                <div class="mixBox">
                    ${mix.map(m=>`<div>${m}</div>`).join("")}
                </div>

                <div class="copyRow">
                    <button class="copyButton copyHex">HEX</button>
                    <button class="copyButton copyMix">Mix</button>
                </div>
            </div>
        `;

        const hexBtn = card.querySelector(".copyHex");
        const mixBtn = card.querySelector(".copyMix");

        hexBtn.onclick=()=>copyText(c.hex);
        mixBtn.onclick=()=>copyText(mix.join(", "));

        palette.appendChild(card);
    });
}

function copyText(text){
    const input=document.createElement("textarea");
    input.value=text;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
}

document.getElementById("closeModal").onclick=()=>paletteModal.style.display="none";
</script>

</body>
</html>
