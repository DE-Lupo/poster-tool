<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farben analysieren</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    text-align: center;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    min-height: 620px;
    background: white;
    padding: 40px;
    border-radius: 20px;
}

h1 { margin-bottom: 10px; }
p { color: #555; }

input[type="file"] { margin-top: 15px; }

#previewBox {
    margin: 20px auto 0;
    width: 100%;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
}

#placeholder {
    color: #999;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    border-radius: 10px;
    border: none;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover { background: #5b21b6; }

button:disabled {
    background: #999;
}

/* POPUP */

#paletteModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9998;
    align-items: center;
    justify-content: center;
}

.modalBox {
    background: white;
    border-radius: 20px;
    padding: 30px;
    max-width: 560px;
    width: 90%;
    position: relative;
}

#closeModal {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    font-weight: bold;
    background: #6d28d9;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

#closeModal:hover {
    background: #5b21b6;
}

#palette {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.colorCard {
    width: 120px;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
}

.colorBox {
    height: 70px;
}

.colorInfo {
    padding: 10px;
    font-size: 13px;
}

.copyButton {
    margin-top: 8px;
    padding: 7px;
    font-size: 12px;
    border-radius: 8px;
    background: #1679D6;
    color: white;
    border: none;
    cursor: pointer;
}

/* Loader */

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Farben analysieren</h1>
    <p>Lade ein Bild hoch und erkenne die wichtigsten Farben daraus.</p>

    <input id="imageInput" type="file" accept="image/*">

    <div id="previewBox">
        <span id="placeholder">Noch kein Bild ausgewählt</span>
        <img id="preview">
    </div>

    <button id="analyzeButton" disabled>Farben analysieren</button>
</div>

<!-- POPUP -->
<div id="paletteModal">
    <div class="modalBox">
        <button id="closeModal">&times;</button>
        <h2>Deine Farbpalette</h2>
        <div id="palette"></div>
    </div>
</div>

<!-- LOADER -->
<div id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");
const analyzeButton = document.getElementById("analyzeButton");

const palette = document.getElementById("palette");
const paletteModal = document.getElementById("paletteModal");
const closeModal = document.getElementById("closeModal");
const loadingOverlay = document.getElementById("loadingOverlay");

let loadedImage = null;

imageInput.addEventListener("change", function () {
    paletteModal.style.display = "none";

    const file = this.files[0];

    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
        analyzeButton.disabled = false;

        loadedImage = new Image();
        loadedImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

analyzeButton.onclick = function () {
    loadingOverlay.style.display = "flex";

    setTimeout(function () {
        const colors = extractColors(loadedImage, 6);
        displayColors(colors);

        loadingOverlay.style.display = "none";
        paletteModal.style.display = "flex";
    }, 400);
};

function extractColors(image, count) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 150;
    canvas.height = 150;
    ctx.drawImage(image, 0, 0, 150, 150);

    const data = ctx.getImageData(0, 0, 150, 150).data;
    const map = {};

    for (let i = 0; i < data.length; i += 16) {
        let r = Math.round(data[i] / 32) * 32;
        let g = Math.round(data[i+1] / 32) * 32;
        let b = Math.round(data[i+2] / 32) * 32;

        const key = `${r},${g},${b}`;
        map[key] = (map[key] || 0) + 1;
    }

    return Object.entries(map)
        .sort((a,b) => b[1] - a[1])
        .slice(0, count)
        .map(e => {
            const [r,g,b] = e[0].split(",").map(Number);
            return { r,g,b, hex: rgbToHex(r,g,b) };
        });
}

function rgbToHex(r,g,b) {
    return "#" + [r,g,b].map(x => {
        const h = x.toString(16);
        return h.length === 1 ? "0"+h : h;
    }).join("").toUpperCase();
}

function displayColors(colors) {
    palette.innerHTML = "";

    colors.forEach(c => {
        const card = document.createElement("div");
        card.className = "colorCard";

        const box = document.createElement("div");
        box.className = "colorBox";
        box.style.background = c.hex;

        const info = document.createElement("div");
        info.className = "colorInfo";
        info.innerHTML = `<strong>${c.hex}</strong><br>RGB ${c.r}, ${c.g}, ${c.b}`;

        const btn = document.createElement("button");
        btn.className = "copyButton";
        btn.innerText = "Kopieren";

        btn.onclick = function () {
            copyText(c.hex);
            btn.innerText = "Kopiert";
            setTimeout(() => btn.innerText = "Kopieren", 1200);
        };

        info.appendChild(btn);
        card.appendChild(box);
        card.appendChild(info);
        palette.appendChild(card);
    });
}

function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
    } else {
        const input = document.createElement("textarea");
        input.value = text;
        input.style.position = "fixed";
        input.style.left = "-9999px";
        document.body.appendChild(input);
        input.focus();
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);
    }
}

closeModal.onclick = () => paletteModal.style.display = "none";

paletteModal.onclick = (e) => {
    if (e.target === paletteModal) {
        paletteModal.style.display = "none";
    }
};
</script>

</body>
</html>
