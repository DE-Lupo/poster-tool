<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farben analysieren</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

#previewBox {
    margin-top: 20px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fafafa;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    border-radius: 10px;
    border: none;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:disabled { background: #999; }

/* POPUP */
#paletteModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9998;
    align-items: center;
    justify-content: center;
}

.modalBox {
    background: white;
    border-radius: 20px;
    padding: 30px;
    width: 95%;
    max-width: 600px;
    position: relative;
}

#closeModal {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: #6d28d9;
    color: white;
    font-size: 22px;
    cursor: pointer;
}

/* Farben */
#palette {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.colorCard {
    width: 160px;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
}

.colorBox {
    height: 70px;
}

.colorInfo {
    padding: 10px;
    font-size: 12px;
    line-height: 1.5;
    white-space: nowrap;
}

.copyButton {
    margin-top: 6px;
    padding: 6px;
    font-size: 12px;
    border-radius: 8px;
    background: #1679D6;
    color: white;
    border: none;
    cursor: pointer;
}

/* Loader */
#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Farben analysieren</h1>
    <input id="imageInput" type="file" accept="image/*">

    <div id="previewBox">
        <img id="preview">
    </div>

    <button id="analyzeButton" disabled>Farben analysieren</button>
</div>

<div id="paletteModal">
    <div class="modalBox">
        <button id="closeModal">&times;</button>
        <h2>Farbpalette</h2>
        <div id="palette"></div>
    </div>
</div>

<div id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const analyzeButton = document.getElementById("analyzeButton");
const palette = document.getElementById("palette");
const paletteModal = document.getElementById("paletteModal");

let loadedImage;

imageInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        preview.src = ev.target.result;
        preview.style.display = "block";
        analyzeButton.disabled = false;

        loadedImage = new Image();
        loadedImage.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

analyzeButton.onclick = () => {
    document.getElementById("loadingOverlay").style.display = "flex";

    setTimeout(() => {
        const colors = extractColors(loadedImage, 6);
        displayColors(colors);

        document.getElementById("loadingOverlay").style.display = "none";
        paletteModal.style.display = "flex";
    }, 400);
};

function extractColors(img, count) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 150;
    canvas.height = 150;
    ctx.drawImage(img, 0, 0, 150, 150);

    const data = ctx.getImageData(0,0,150,150).data;
    const map = {};

    for (let i=0;i<data.length;i+=16){
        let r = Math.round(data[i]/32)*32;
        let g = Math.round(data[i+1]/32)*32;
        let b = Math.round(data[i+2]/32)*32;
        const key = `${r},${g},${b}`;
        map[key] = (map[key]||0)+1;
    }

    return Object.entries(map)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,count)
        .map(e=>{
            const [r,g,b]=e[0].split(",").map(Number);
            return {r,g,b,hex:rgbToHex(r,g,b)};
        });
}

function rgbToHex(r,g,b){
    return "#"+[r,g,b].map(x=>{
        const h=x.toString(16);
        return h.length===1?"0"+h:h;
    }).join("").toUpperCase();
}

/* RAL */
const ralColors = [
    { code: "1015", name: "Hellelfenbein", r: 230, g: 210, b: 181 },
    { code: "3000", name: "Feuerrot", r: 175, g: 43, b: 30 },
    { code: "5015", name: "Himmelblau", r: 0, g: 124, b: 176 },
    { code: "6018", name: "Gelbgrün", r: 97, g: 153, b: 59 },
    { code: "7016", name: "Anthrazitgrau", r: 56, g: 62, b: 66 },
    { code: "7035", name: "Lichtgrau", r: 197, g: 199, b: 196 },
    { code: "9005", name: "Tiefschwarz", r: 14, g: 14, b: 16 },
    { code: "9010", name: "Reinweiß", r: 241, g: 236, b: 225 }
];

function findNearestRal(r,g,b){
    let best=ralColors[0];
    let dist=Infinity;

    ralColors.forEach(ral=>{
        let d=(r-ral.r)**2+(g-ral.g)**2+(b-ral.b)**2;
        if(d<dist){dist=d;best=ral;}
    });
    return best;
}

function displayColors(colors){
    palette.innerHTML="";

    colors.forEach(c=>{
        const ral = findNearestRal(c.r,c.g,c.b);

        const card=document.createElement("div");
        card.className="colorCard";

        card.innerHTML=`
            <div class="colorBox" style="background:${c.hex}"></div>
            <div class="colorInfo">
                <strong>${c.hex}</strong><br>
                RGB ${c.r}, ${c.g}, ${c.b}<br>
                RAL ${ral.code} ${ral.name}
                <br>
                <button class="copyButton">Kopieren</button>
            </div>
        `;

        const btn = card.querySelector("button");
        btn.onclick=()=>{
            copyText(c.hex);
            btn.innerText="Kopiert";
            setTimeout(()=>btn.innerText="Kopieren",1200);
        };

        palette.appendChild(card);
    });
}

function copyText(text){
    const input=document.createElement("textarea");
    input.value=text;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
}

document.getElementById("closeModal").onclick=()=>paletteModal.style.display="none";
</script>

</body>
</html>
