<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Poster Generator - Katicas Galerie Ludwigshafen</title>
</head>

<body style="text-align:center; margin-top:50px; font-family:Arial;">

<h1>Poster Generator</h1>

<form action="/create-pdf" method="post" enctype="multipart/form-data">
    
    <input type="file" name="image" required>
    
    <br><br>

    <label>Format wählen:</label><br>
    <select name="format">
        <option value="A4">A4 (1 Seite)</option>
        <option value="A3">A3 (4 Seiten)</option>
        <option value="A2">A2 (8 Seiten)</option>
        <option value="A1">A1 (16 Seiten)</option>
    </select>

    <br><br>
    
    <input type="submit" value="PDF erstellen">

</form>

</body>
</html>
