<html lang="de"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <title>Poster Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }

        .box {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 16px;
        }

        input, button {
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #6d28d9;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        #loading {
            display: none;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Poster Generator</h1>
    <p>Lade ein Bild hoch und erstelle daraus eine PDF.</p>

    <form id="posterForm" action="file:///C:/create-pdf" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required="">
        <br>
        <button type="submit">PDF erstellen</button>
    </form>

    <div id="loading">
        PDF wird erstellt...
    </div>
</div>

<script>
    const form = document.getElementById("posterForm");
    const loading = document.getElementById("loading");

    form.addEventListener("submit", function () {
        loading.style.display = "block";
    });
</script>


</body></html>
