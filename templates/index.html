<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild zu Poster</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    text-align: center;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    background: white;
    padding: 28px;
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.05);
}

h1 { margin: 0 0 8px; }
p { color: #555; margin: 0 0 14px; }

input[type="file"] {
    margin-top: 8px;
    max-width: 100%;
}

#previewBox {
    margin: 14px auto 0;
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    overflow: hidden;
}

#placeholder {
    color: #999;
    font-size: 14px;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

.optionsGrid {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    text-align: left;
}

.optionFull {
    grid-column: 1 / -1;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-size: 13px;
}

select {
    width: 100%;
    padding: 9px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    margin-top: 14px;
    width: 100%;
    padding: 12px 18px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover { background: #5b21b6; }

button:disabled {
    background: #999;
    cursor: not-allowed;
}

#pageInfo {
    margin-top: 12px;
    color: #555;
    font-weight: bold;
    font-size: 14px;
}

#doneMessage {
    display: none;
    margin-top: 12px;
    color: #15803d;
    font-weight: bold;
    font-size: 14px;
}

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.loaderBox {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 260px;
    text-align: center;
}

.spinner {
    width: 48px;
    height: 48px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 18px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@media (max-width: 520px) {
    body {
        padding: 12px;
    }

    .container {
        padding: 22px;
    }

    .optionsGrid {
        grid-template-columns: 1fr;
    }

    .optionFull {
        grid-column: auto;
    }

    #previewBox {
        height: 200px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Bild zu Poster</h1>
    <p>Lade ein Bild hoch und erstelle daraus eine druckbare PDF.</p>

    <form id="form" action="/create-pdf" method="post" enctype="multipart/form-data" target="downloadFrame">
        <input id="imageInput" type="file" name="image" accept="image/*" required>

        <div id="previewBox">
            <span id="placeholder">Noch kein Bild ausgewählt</span>
            <img id="preview" alt="Bildvorschau">
        </div>

        <div class="optionsGrid">
            <div class="optionFull">
                <label for="formatSelect">Posterformat</label>
                <select id="formatSelect" name="format">
                    <option value="A4" data-pages="1">A4 (1 Seite)</option>
                    <option value="A3" data-pages="2">A3 (2 Seiten)</option>
                    <option value="A2" data-pages="4">A2 (4 Seiten)</option>
                    <option value="A1" data-pages="8">A1 (8 Seiten)</option>
                </select>
            </div>

            <div>
                <label for="marginSelect">Rand</label>
                <select id="marginSelect" name="margin_mm">
                    <option value="0">Kein Rand</option>
                    <option value="5" selected>5 mm</option>
                    <option value="10">10 mm</option>
                </select>
            </div>

            <div>
                <label for="overlapSelect">Überlappung</label>
                <select id="overlapSelect" name="overlap_mm">
                    <option value="0" selected>Keine</option>
                    <option value="5">5 mm</option>
                    <option value="10">10 mm</option>
                </select>
            </div>
        </div>

        <div id="pageInfo">
            Dein Poster wird aus 1 A4-Seite bestehen.
        </div>

        <button id="submitButton" type="submit">PDF erstellen</button>
    </form>

    <div id="doneMessage">
        PDF wurde erstellt. Der Download sollte gestartet sein.
    </div>
</div>

<iframe name="downloadFrame" id="downloadFrame" style="display:none;"></iframe>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <h3>Poster wird erstellt…</h3>
        <p>Bitte kurz warten.</p>
    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");
const form = document.getElementById("form");
const loadingOverlay = document.getElementById("loadingOverlay");
const submitButton = document.getElementById("submitButton");
const formatSelect = document.getElementById("formatSelect");
const pageInfo = document.getElementById("pageInfo");
const doneMessage = document.getElementById("doneMessage");
const downloadFrame = document.getElementById("downloadFrame");

let submitted = false;

imageInput.addEventListener("change", function () {
    doneMessage.style.display = "none";

    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        placeholder.style.display = "block";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
    };

    reader.readAsDataURL(file);
});

formatSelect.addEventListener("change", function () {
    doneMessage.style.display = "none";

    const pages = this.options[this.selectedIndex].dataset.pages;
    const word = pages === "1" ? "A4-Seite" : "A4-Seiten";
    pageInfo.innerText = "Dein Poster wird aus " + pages + " " + word + " bestehen.";
});

form.addEventListener("submit", function () {
    submitted = true;
    doneMessage.style.display = "none";
    loadingOverlay.style.display = "flex";
    submitButton.disabled = true;
    submitButton.innerText = "PDF wird erstellt...";
});

downloadFrame.addEventListener("load", function () {
    if (!submitted) return;

    loadingOverlay.style.display = "none";
    submitButton.disabled = false;
    submitButton.innerText = "PDF erstellen";
    doneMessage.style.display = "block";
    submitted = false;
});

setInterval(function () {
    if (submitted) {
        loadingOverlay.style.display = "none";
        submitButton.disabled = false;
        submitButton.innerText = "PDF erstellen";
        doneMessage.style.display = "block";
        submitted = false;
    }
}, 12000);
</script>

</body>
</html>
