<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild zu Poster</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6; /* 🔥 BLAUER HINTERGRUND */
    text-align: center;
    margin: 0;

    /* 🔥 sorgt für perfekte Zentrierung */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 { margin-bottom: 10px; }
p { color: #555; }

input[type="file"] { margin-top: 15px; }

select {
    margin-top: 18px;
    padding: 10px;
    font-size: 16px;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover { background: #5b21b6; }

button:disabled {
    background: #999;
    cursor: not-allowed;
}

#preview {
    display: none;
    margin: 20px auto 0;
    max-width: 100%;
    max-height: 260px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

#pageInfo {
    margin-top: 15px;
    color: #555;
    font-weight: bold;
}

#doneMessage {
    display: none;
    margin-top: 18px;
    color: #15803d;
    font-weight: bold;
}

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.loaderBox {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 280px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

.spinner {
    width: 52px;
    height: 52px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Bild zu Poster</h1>
    <p>Lade ein Bild hoch und erstelle daraus eine druckbare PDF.</p>

    <form id="form" action="/create-pdf" method="post" enctype="multipart/form-data" target="downloadFrame">
        <input id="imageInput" type="file" name="image" accept="image/*" required>

        <img id="preview" alt="Bildvorschau">
        
        <br>

        <select id="formatSelect" name="format">
            <option value="A4" data-pages="1">A4 (1 Seite)</option>
            <option value="A3" data-pages="4">A3 (4 Seiten)</option>
            <option value="A2" data-pages="8">A2 (8 Seiten)</option>
            <option value="A1" data-pages="16">A1 (16 Seiten)</option>
        </select>

        <div id="pageInfo">
            Dein Poster wird aus 1 A4-Seite bestehen.
        </div>

        <br>

        <button id="submitButton" type="submit">PDF erstellen</button>
    </form>

    <div id="doneMessage">
        PDF wurde erstellt. Der Download sollte gestartet sein.
    </div>
</div>

<iframe name="downloadFrame" id="downloadFrame" style="display:none;"></iframe>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <h3>Poster wird erstellt…</h3>
        <p>Bitte kurz warten.</p>
    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const loadingOverlay = document.getElementById("loadingOverlay");
const submitButton = document.getElementById("submitButton");
const formatSelect = document.getElementById("formatSelect");
const pageInfo = document.getElementById("pageInfo");
const doneMessage = document.getElementById("doneMessage");
const downloadFrame = document.getElementById("downloadFrame");

let submitted = false;

imageInput.addEventListener("change", function () {
    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
    };

    reader.readAsDataURL(file);
});

formatSelect.addEventListener("change", function () {
    const pages = this.options[this.selectedIndex].dataset.pages;
    const word = pages === "1" ? "A4-Seite" : "A4-Seiten";
    pageInfo.innerText = "Dein Poster wird aus " + pages + " " + word + " bestehen.";
});

form.addEventListener("submit", function () {
    submitted = true;
    doneMessage.style.display = "none";
    loadingOverlay.style.display = "flex";
    submitButton.disabled = true;
    submitButton.innerText = "PDF wird erstellt...";
});

downloadFrame.addEventListener("load", function () {
    if (!submitted) return;

    loadingOverlay.style.display = "none";
    submitButton.disabled = false;
    submitButton.innerText = "PDF erstellen";
    doneMessage.style.display = "block";
    submitted = false;
});

setInterval(function () {
    if (submitted) {
        loadingOverlay.style.display = "none";
        submitButton.disabled = false;
        submitButton.innerText = "PDF erstellen";
        doneMessage.style.display = "block";
        submitted = false;
    }
}, 12000);
</script>

</body>
</html>
