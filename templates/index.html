<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild zu Poster</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 520px;
    margin: 60px auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 10px;
}

p {
    color: #555;
}

input[type="file"] {
    margin-top: 15px;
}

select {
    margin-top: 18px;
    padding: 10px;
    font-size: 16px;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #5b21b6;
}

#preview {
    display: none;
    margin: 20px auto 0;
    max-width: 100%;
    max-height: 260px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

#loading {
    display: none;
    margin-top: 20px;
    font-weight: bold;
    color: #6d28d9;
}
</style>
</head>

<body>

<div class="container">
    <h1>Bild zu Poster</h1>
    <p>Lade ein Bild hoch und erstelle daraus eine druckbare PDF.</p>

    <form id="form" action="/create-pdf" method="post" enctype="multipart/form-data">
        
        <input id="imageInput" type="file" name="image" accept="image/*" required>

        <img id="preview" alt="Bildvorschau">
        
        <br>

        <select name="format">
            <option value="A4">A4 (1 Seite)</option>
            <option value="A3">A3 (4 Seiten)</option>
            <option value="A2">A2 (8 Seiten)</option>
            <option value="A1">A1 (16 Seiten)</option>
        </select>

        <br>

        <button type="submit">PDF erstellen</button>
    </form>

    <div id="loading">
        PDF wird erstellt...
    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const loading = document.getElementById("loading");

imageInput.addEventListener("change", function () {
    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
    };

    reader.readAsDataURL(file);
});

form.addEventListener("submit", function () {
    loading.style.display = "block";
});
</script>

</body>
</html>
