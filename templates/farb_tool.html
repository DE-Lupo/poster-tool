<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farb-Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1679D6;
    text-align: center;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 520px;
    width: 100%;
    min-height: 620px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: none;
    border: 1px solid rgba(0,0,0,0.05);
}

h1 { margin-bottom: 10px; }
p { color: #555; }

input[type="file"] { margin-top: 15px; }

#previewBox {
    margin: 20px auto 0;
    width: 100%;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    overflow: hidden;
}

#placeholder {
    color: #999;
    font-size: 14px;
}

#preview {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

select {
    margin-top: 18px;
    padding: 10px;
    font-size: 16px;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #6d28d9;
    color: white;
    cursor: pointer;
}

button:hover { background: #5b21b6; }

button:disabled {
    background: #999;
    cursor: not-allowed;
}

#doneMessage {
    display: none;
    margin-top: 18px;
    color: #15803d;
    font-weight: bold;
}

#loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.loaderBox {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 280px;
    text-align: center;
}

.spinner {
    width: 52px;
    height: 52px;
    border: 6px solid #ddd;
    border-top: 6px solid #6d28d9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Farb-Tool</h1>
    <p>Reduzieren Sie Ihr Bild auf wenige Farben und erstellen Sie eine klare Vorlage zum Malen.</p>

    <form id="form" action="/create-farb-tool" method="post" enctype="multipart/form-data" target="downloadFrame">
        <input id="imageInput" type="file" name="image" accept="image/*" required>

        <div id="previewBox">
            <span id="placeholder">Noch kein Bild ausgewählt</span>
            <img id="preview" alt="Bildvorschau">
        </div>

        <br>

        <label style="display:block;margin-top:18px;color:#555;">
            Anzahl Farben
        </label>

        <select name="color_count">
            <option value="4">4 Farben</option>
            <option value="6">6 Farben</option>
            <option value="8" selected>8 Farben</option>
            <option value="10">10 Farben</option>
            <option value="12">12 Farben</option>
            <option value="16">16 Farben</option>
            <option value="24">24 Farben</option>
        </select>

        <br>

        <label style="display:block;margin-top:18px;color:#555;">
            Stil
        </label>

        <select name="style">
            <option value="klar" selected>Klar / plakativ</option>
            <option value="weich">Weich / geglättet</option>
        </select>

        <br>

        <button id="submitButton" type="submit">Bild vereinfachen</button>
    </form>

    <div id="doneMessage">
        Bild wurde erstellt. Der Download sollte gestartet sein.
    </div>
</div>

<iframe name="downloadFrame" id="downloadFrame" style="display:none;"></iframe>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <h3>Bild wird vereinfacht…</h3>
        <p>Bitte kurz warten.</p>
    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");
const form = document.getElementById("form");
const loadingOverlay = document.getElementById("loadingOverlay");
const submitButton = document.getElementById("submitButton");
const doneMessage = document.getElementById("doneMessage");
const downloadFrame = document.getElementById("downloadFrame");

let submitted = false;

imageInput.addEventListener("change", function () {
    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        placeholder.style.display = "block";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
    };

    reader.readAsDataURL(file);
});

form.addEventListener("submit", function () {
    submitted = true;
    doneMessage.style.display = "none";
    loadingOverlay.style.display = "flex";
    submitButton.disabled = true;
    submitButton.innerText = "Bild wird erstellt...";
});

downloadFrame.addEventListener("load", function () {
    if (!submitted) return;

    loadingOverlay.style.display = "none";
    submitButton.disabled = false;
    submitButton.innerText = "Bild vereinfachen";
    doneMessage.style.display = "block";
    submitted = false;
});

setInterval(function () {
    if (submitted) {
        loadingOverlay.style.display = "none";
        submitButton.disabled = false;
        submitButton.innerText = "Bild vereinfachen";
        doneMessage.style.display = "block";
        submitted = false;
    }
}, 12000);
</script>
<script>
function hasConsent() {
    return window.RCB_Consent && window.RCB_Consent.hasConsent("bildverarbeitungs-tools-poster-raster-farb-tool-etc");
}

document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("form");

    if (!hasConsent()) {
        form.style.opacity = "0.4";
    }

    form.addEventListener("submit", function(e) {
        if (!hasConsent()) {
            e.preventDefault();
            alert("Bitte akzeptieren Sie die funktionalen Services, um das Tool zu nutzen.");
        }
    });
});
</script>
</body>
</html>
